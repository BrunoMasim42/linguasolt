<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Admin Lingua Solta</title>
  <link rel="stylesheet" href="./assets/css/admin.css">
  <script src="./assets/js/admin.js" defer></script>
</head>
<body class="login-page">
  <div class="login-box">
    <h1>Acesso administrativo</h1>
    <p class="muted">Entre com seu e-mail e senha para gerenciar o site.</p>
    <form id="login-form">
      <input type="email" name="email" placeholder="E-mail" autocomplete="username" required>
      <input type="password" name="senha" placeholder="Senha" autocomplete="current-password" required>
      <button class="btn" type="submit">Entrar</button>
      <p id="login-status" class="status muted"></p>
    </form>
  </div>
</body>
</html>
