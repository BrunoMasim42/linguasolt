<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instituto Língua Solta</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">

</head>
<body>
  
  <div id="header"></div>

  <section class="hero-title container">
    <h1>Instituto Língua Solta</h1>
    <p class="section-subtitle">Projetos sociais, cultura, educação e desenvolvimento comunitário.</p>
  </section>

  <section class="carousel reveal">
    <button class="nav prev">&#10094;</button>
    <div class="carousel-track" id="banners-track"></div>
    <button class="nav next">&#10095;</button>
  </section>

  <section class="section container">
    <div class="hero-title">
      <h2 class="section-title">Ações em destaque</h2>
      <p class="section-subtitle">Agora essa seção é gerenciada pelo painel administrativo, com imagem, título, descrição e link.</p>
    </div>
    <div class="actions-grid" id="lista-acoes"></div>
  </section>

  <section class="section container">
    <div class="hero-title">
      <h2 class="section-title">Projetos recentes</h2>
    </div>
    <div id="lista-projetos" class="grid-3"></div>
  </section>

  <div id="modal-acao" class="modal hidden">
    <div class="modal-content">
      <button id="fechar-modal-acao" class="modal-close">×</button>
      <img id="modal-acao-imagem" src="" alt="">
      <h3 id="modal-acao-titulo"></h3>
      <p id="modal-acao-descricao"></p>
    </div>
  </div>

  <div class="contact-box">
    <h2 class="section-title">Fale Conosco</h2>
    <form id="contato-form" class="form-grid">
      <input type="text" name="nome" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="Seu e-mail" required>
      <textarea name="mensagem" placeholder="Sua mensagem" required></textarea>
      <button class="btn" type="submit">Enviar mensagem</button>
      <p id="contato-status" class="muted"></p>
    </form>
  </div>

  <div id="footer"></div>

  <script src="./js/components.js"></script>
  <script src="./js/site.js"></script>
</body>
</body>
</html>
