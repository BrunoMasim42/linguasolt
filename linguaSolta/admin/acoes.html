        <div class="topbar"><h2>Ações em destaque</h2></div><div class="split"><section class="card"><h3 style="margin-bottom:12px">Cadastrar / editar ação</h3><form id="form-acoes" class="form-grid" enctype="multipart/form-data"><input name="titulo" placeholder="Título da ação" required><input name="link" placeholder="Link do botão / página de destino"><input name="ordem" type="number" value="0" placeholder="Ordem"><select name="ativo"><option value="1">Ativo</option><option value="0">Inativo</option></select><textarea class="full" name="descricao" rows="6" placeholder="Descrição da ação"></textarea><input class="full" type="file" name="imagem" accept="image/*"><div class="toolbar full"><button class="btn" type="submit">Salvar</button><button class="btn alt" type="button" id="cancelar-acao">Cancelar edição</button></div><p id="status-acoes" class="status muted"></p></form></section><section class="card table-wrap"><h3 style="margin-bottom:12px">Ações cadastradas</h3><table><thead><tr><th>Imagem</th><th>Título</th><th>Descrição</th><th>Ordem</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tbody-acoes"></tbody></table></section></div></main></div></body></html>
