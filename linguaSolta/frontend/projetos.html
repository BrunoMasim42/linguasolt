<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos | Instituto Língua Solta</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/site.js" defer></script>
</head>
<body>
  <div id="header"></div>

  <section class="hero-title container">
    <h1>Nossos Projetos</h1>
    <p class="section-subtitle">Clique na imagem para ver a descrição completa.</p>
  </section>

  <section class="section container">
    <div id="lista-projetos" class="grid-3"></div>
  </section>

  <div id="modal-projeto" class="modal hidden">
    <div class="modal-content">
      <button id="fechar-modal" class="modal-close" aria-label="Fechar">×</button>
      <img id="modal-imagem" src="" alt="">
      <h3 id="modal-titulo"></h3>
      <p id="modal-descricao"></p>
    </div>
  </div>

   <div id="footer"></div>

  <script src="./js/components.js"></script>
  <script src="./js/site.js"></script>
</body>
</html>
