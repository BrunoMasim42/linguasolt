<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credenciados | Instituto Língua Solta</title>

  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/credenciados.css">

  <script src="./js/site.js" defer></script>
  <script src="./js/credenciados.js" defer></script>
</head>

<body>

<div id="header"></div>


<section class="page-banner">

    <div class="container">

        <h1>Credenciados</h1>

        <p>
            Conheça os profissionais e associados credenciados
            pelo Instituto Língua Solta.
        </p>

    </div>

</section>


<section class="container">

    <div class="credenciados-toolbar">

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar por nome, cidade ou profissão..."
        >

        <select id="cidade">

            <option value="">Todos os municípios</option>

        </select>

    </div>

</section>


<section class="container">

    <div id="lista-credenciados" class="credenciados-grid">

        <!-- carregado pelo JavaScript -->

    </div>

</section>


<div id="modalCredenciado" class="modal hidden">

    <div class="modal-content modal-perfil">

        <button id="fecharModal" class="modal-close">

            ×

        </button>

        <div class="perfil-topo">

            <img
                id="perfilImagem"
                src=""
                alt=""
            >

            <div>

                <h2 id="perfilNome"></h2>

                <h4 id="perfilCargo"></h4>

                <span id="perfilCidade"></span>

            </div>

        </div>

        <div class="perfil-conteudo">

            <p id="perfilBiografia"></p>

        </div>

        <div class="perfil-contatos">

            <a
                id="perfilWhatsapp"
                target="_blank"
                class="hidden"
            >
                <i class='bx bxl-whatsapp'></i>

                WhatsApp
            </a>

            <a
                id="perfilInstagram"
                target="_blank"
                class="hidden"
            >
                <i class='bx bxl-instagram'></i>

                Instagram
            </a>

            <a
                id="perfilFacebook"
                target="_blank"
                class="hidden"
            >
                <i class='bx bxl-facebook'></i>

                Facebook
            </a>

            <a
                id="perfilEmail"
                class="hidden"
            >
                <i class='bx bx-envelope'></i>

                E-mail
            </a>

        </div>

    </div>

</div>


 <div id="footer"></div>

  <script src="./js/components.js"></script>
  <script src="./js/site.js"></script>

</body>
</html>
