<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria | Instituto Língua Solta</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/site.js" defer></script>
</head>
<body>
 <div id="header"></div>

  <section class="section container">
    <div class="galeria-topo">
      <input
        type="text"
        id="busca-galeria"
        placeholder="Buscar fotos: por título ou descrição"
      >
    </div>

    <div class="hero-title">
      <h1>Galeria</h1>
      <p class="section-subtitle">Confira nossas fotos!</p>
    </div>

    <div id="lista-galeria" class="galeria-pastas"></div>
  </section>

  <div id="modal-galeria" class="modal hidden">
  <div class="modal-content">
    <button id="fechar-modal-galeria" class="modal-close" aria-label="Fechar">×</button>
    <img id="modal-galeria-imagem" src="" alt="">
    <h3 id="modal-galeria-titulo"></h3>
    <p id="modal-galeria-descricao"></p>
  </div>
</div>

   <div id="footer"></div>

  <script src="./js/components.js"></script>
  <script src="./js/site.js"></script>
</body>
</html>
