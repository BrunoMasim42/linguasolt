<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria | Instituto Língua Solta</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/site.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <img src="./img/logoPaquena.png" alt="Logo">
    </div>

    <nav class="menu">
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="texto.html">Quem Somos</a></li>
        <li><a href="projetos.html">Projetos</a></li>
        <li><a href="galeria.html">Galeria</a></li>
        <li><a href="prestacao.html">Prestação de Contas</a></li>
      </ul>
    </nav>

    <div class="social">
      <a href="https://www.instagram.com/institutolinguasolta/" target="_blank"><i class='bx bxl-instagram-alt'></i></a>
      <a href="#"><i class='bx bxl-youtube'></i></a>
      <a href="#"><i class='bx bxl-whatsapp'></i></a>
    </div>

    <div class="hamburger">☰</div>
  </header>

  <section class="section container">
    <div class="galeria-topo">
      <input
        type="text"
        id="busca-galeria"
        placeholder="Buscar fotos: por título ou descrição"
      >
    </div>

    <div class="hero-title">
      <h1>Galeria</h1>
      <p class="section-subtitle">Confira nossas fotos!</p>
    </div>

    <div id="lista-galeria" class="grid-3"></div>
  </section>

  <div id="modal-galeria" class="modal hidden">
  <div class="modal-content">
    <button id="fechar-modal-galeria" class="modal-close" aria-label="Fechar">×</button>
    <img id="modal-galeria-imagem" src="" alt="">
    <h3 id="modal-galeria-titulo"></h3>
    <p id="modal-galeria-descricao"></p>
  </div>
</div>

  <footer class="site-footer">
    <p>© 2026 - Instituto Língua Solta - Todos os direitos reservados</p>
  </footer>
</body>
</html>
