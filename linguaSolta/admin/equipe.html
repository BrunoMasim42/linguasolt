<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Equipe</title>

<link rel="stylesheet" href="assets/css/admin.css">

</head>

<body>

<div class="container">

    <h1>Equipe do Instituto</h1>

    <form id="equipeForm" enctype="multipart/form-data">

        <input type="hidden" id="id">

        <label>Foto</label>

        <input
            type="file"
            id="foto"
            name="foto"
            accept="image/*">

        <div style="margin:15px 0">

            <img
                id="preview"
                src=""
                style="display:none;width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid #ccc">

        </div>

        <label>Nome</label>

        <input
            type="text"
            id="nome"
            name="nome"
            required>

        <label>Cargo</label>

        <input
            type="text"
            id="cargo"
            name="cargo"
            required>

        <label>Mini Biografia</label>

        <textarea
            id="biografia"
            name="biografia"
            rows="5"></textarea>

        <label>Facebook</label>

        <input
            type="url"
            id="facebook"
            name="facebook">

        <label>Instagram</label>

        <input
            type="url"
            id="instagram"
            name="instagram">

        <label>WhatsApp</label>

        <input
            type="text"
            id="whatsapp"
            name="whatsapp">

        <label>Ordem de Exibição</label>

        <input
            type="number"
            id="ordem"
            name="ordem"
            value="0">

        <label>Status</label>

        <select
            id="ativo"
            name="ativo">

            <option value="1">Ativo</option>

            <option value="0">Inativo</option>

        </select>

        <button type="submit">

            Salvar Membro

        </button>

    </form>

    <hr>

    <h2>Membros Cadastrados</h2>

    <table>

        <thead>

            <tr>

                <th>Foto</th>

                <th>Nome</th>

                <th>Cargo</th>

                <th>Status</th>

                <th>Ações</th>

            </tr>

        </thead>

        <tbody id="listaEquipe"></tbody>

    </table>

</div>

<script src="assets/js/equipe.js"></script>

<script>

const foto=document.getElementById("foto");

const preview=document.getElementById("preview");

foto.addEventListener("change",function(){

    const arquivo=this.files[0];

    if(!arquivo)return;

    preview.src=URL.createObjectURL(arquivo);

    preview.style.display="block";

});

</script>

</body>

</html>
