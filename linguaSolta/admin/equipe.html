<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Equipe</title>

<link rel="stylesheet" href="assets/css/admin.css">

</head>

<body>
    <nav><a href="dashboard.html">Dashboard</a>
        <a href="acoes.html">Ações</a>
        <a href="projetos.html">Projetos</a>
        <a href="galeria.html">Galeria</a>
        <a href="credenciados.html">Credenciados</a>
        <a href="banners.html">Banners</a>
        <a href="paginas.html">Páginas</a>
        <a href="prestacao.html">Prestação</a>
        <a href="contatos.html">Contatos</a>
        <a href="#" id="logout-btn">Sair</a>
    </nav>

<div class="container">

 <h1>Equipe do Instituto</h1>

<div class="card">

    <form id="equipeForm" enctype="multipart/form-data">

        <input type="hidden" id="id">

        <label for="foto">Foto</label>
        <input
            type="file"
            id="foto"
            name="foto"
            accept="image/*">

        <div class="preview-box">
            <img
                id="preview"
                src=""
                alt="Preview"
                style="display:none;">
        </div>

        <div class="form-grid">

            <div>
                <label for="nome">Nome</label>
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    required>
            </div>

            <div>
                <label for="cargo">Cargo</label>
                <input
                    type="text"
                    id="cargo"
                    name="cargo"
                    required>
            </div>

        </div>

        <label for="biografia">Mini Biografia</label>
        <textarea
            id="biografia"
            name="biografia"
            rows="5"></textarea>

        <h3 style="margin:20px 0 10px">Redes Sociais</h3>

        <div class="form-grid">

            <div>
                <label for="facebook">Facebook</label>
                <input
                    type="url"
                    id="facebook"
                    name="facebook">
            </div>

            <div>
                <label for="instagram">Instagram</label>
                <input
                    type="url"
                    id="instagram"
                    name="instagram">
            </div>

        </div>

        <label for="whatsapp">WhatsApp</label>
        <input
            type="text"
            id="whatsapp"
            name="whatsapp">

        <div class="form-grid">

            <div>
                <label for="ordem">Ordem de Exibição</label>
                <input
                    type="number"
                    id="ordem"
                    name="ordem"
                    value="0">
            </div>

            <div>
                <label for="ativo">Status</label>
                <select
                    id="ativo"
                    name="ativo">
                    <option value="1">Ativo</option>
                    <option value="0">Inativo</option>
                </select>
            </div>

        </div>

        <div class="toolbar">

            <button
                class="btn"
                type="submit">
                Salvar Membro
            </button>

            <button
                class="btn alt"
                type="reset"
                id="cancelar-equipe">
                Cancelar
            </button>

        </div>

        <p
            id="status-equipe"
            class="status muted"></p>

    </form>

</div>

<div class="card table-wrap">

    <h2 style="margin-bottom:15px">
        Membros Cadastrados
    </h2>

    <table>

        <thead>

            <tr>

                <th width="90">Foto</th>
                <th>Nome</th>
                <th>Cargo</th>
                <th width="90">Ordem</th>
                <th width="120">Status</th>
                <th width="180">Ações</th>

            </tr>

        </thead>

        <tbody id="listaEquipe">

        </tbody>

    </table>

</div>

</div>

<script src="assets/js/equipe.js"></script>

<script>

const foto=document.getElementById("foto");

const preview=document.getElementById("preview");

foto.addEventListener("change",function(){

    const arquivo=this.files[0];

    if(!arquivo)return;

    preview.src=URL.createObjectURL(arquivo);

    preview.style.display="block";

});

</script>

</body>

</html>
