<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <title>Quem Somos | Instituto Língua Solta</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/config.js"></script>
  <script src="./js/site.js" defer></script>

  <style>
    .texto-page {
      max-width: 1200px;
      margin: 140px auto 60px;
      padding: 0 20px;
    }

    .texto-box {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 36px;
    }

    .texto-box h1 {
      font-size: 2.8rem;
      color: #7a0019;
      margin-bottom: 28px;
      text-align: center;
    }

    .texto-conteudo {
      font-size: 1.08rem;
      line-height: 1.95;
      color: #2f2f2f;
      text-align: justify;
      text-justify: inter-word;
    }

    .texto-conteudo p {
      margin-bottom: 18px;
    }
  </style>
</head>
<body>

  <!-- use aqui o mesmo header do index -->

<div id="header"></div>

  <main class="texto-page">
    <section class="texto-box reveal">
      <h1 id="quem-somos-titulo">Quem Somos</h1>
      <div id="quem-somos-conteudo" class="texto-conteudo">
        <p>Carregando conteúdo...</p>
      </div>
    </section>
  
  <!-- ==========================
NOSSA EQUIPE
========================== -->

<section class="equipe-section reveal">

    <div class="container">

        <div class="titulo-equipe">

            <h2>Nossa Equipe</h2>

            <p>

                Conheça as pessoas que fazem parte do Instituto Língua Solta.

            </p>

        </div>

        <div id="listaEquipe" class="equipe-grid">

            <div class="loading-equipe">

                Carregando equipe...

            </div>

        </div>

    </div>

</section>

</main>


  <!-- use aqui o mesmo footer do index -->
    <div id="footer"></div>

  <script src="./js/components.js"></script>
  <script src="./js/site.js"></script>

</body>
</html>
